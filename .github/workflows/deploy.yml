name: Deploy to VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: 'vm-deploy'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to VM via rsync
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            ./ ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/resume-hub/

      - name: Build Docker image on VM
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
            "cd ~/resume-hub && docker build -t resume-hub:latest ."

      - name: Deploy with Docker Compose on VM
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
            "cd ~/resume-hub && docker compose up -d --force-recreate && echo '✅ resume-hub deployed'"
