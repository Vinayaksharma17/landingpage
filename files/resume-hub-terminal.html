<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VS — Resume Hub</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #090c09;
        --bg2: #0d110d;
        --surface: #111711;
        --surface2: #161e16;
        --border: #1e2b1e;
        --border2: #243224;
        --green: #22c55e;
        --green-dim: #16a34a;
        --text: #e8f0e8;
        --text2: #a0b4a0;
        --text3: #5a7a5a;
        --mono: 'IBM Plex Mono', monospace;
        --body: 'Space Grotesk', sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--body);
        min-height: 100vh;
        overflow-x: hidden;
      }

      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 3px;
      }

      .grid-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image:
          linear-gradient(var(--border) 1px, transparent 1px),
          linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 48px 48px;
        opacity: 0.4;
      }

      .noise {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        opacity: 0.025;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 200px 200px;
      }

      .glow-orb {
        position: fixed;
        top: -100px;
        left: 50%;
        transform: translateX(-50%);
        width: 600px;
        height: 400px;
        background: radial-gradient(
          ellipse,
          rgba(34, 197, 94, 0.07) 0%,
          transparent 70%
        );
        pointer-events: none;
        z-index: 0;
      }

      .page {
        position: relative;
        z-index: 2;
        max-width: 480px;
        margin: 0 auto;
        padding: 60px 24px 80px;
      }

      .header {
        text-align: center;
        margin-bottom: 44px;
      }

      .avatar-wrap {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 76px;
        height: 76px;
        border-radius: 50%;
        background: var(--surface);
        margin-bottom: 20px;
        position: relative;
      }
      .avatar-wrap::before {
        content: '';
        position: absolute;
        inset: -3px;
        border-radius: 50%;
        background: conic-gradient(
          var(--green),
          var(--green-dim),
          transparent,
          var(--green)
        );
        z-index: -1;
        animation: spinRing 4s linear infinite;
      }
      @keyframes spinRing {
        to {
          transform: rotate(360deg);
        }
      }

      .avatar-inner {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background: var(--surface);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
      }

      .name {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -1px;
        color: var(--text);
        margin-bottom: 6px;
      }
      .name span {
        color: var(--green);
      }

      .tag-line {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text3);
      }
      .tag-line::before {
        content: '>_';
        color: var(--green);
        margin-right: 4px;
      }

      .cursor {
        display: inline-block;
        width: 8px;
        height: 13px;
        background: var(--green);
        animation: blink 1s step-end infinite;
        vertical-align: middle;
        margin-left: 2px;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      .divider {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--green-dim),
          transparent
        );
        margin: 32px 0;
        opacity: 0.5;
      }

      .links {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .link-card {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 18px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        text-decoration: none;
        color: var(--text);
        transition:
          background 0.2s,
          border-color 0.2s,
          transform 0.15s;
        position: relative;
        overflow: hidden;
      }
      .link-card::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: var(--card-accent, var(--green));
        border-radius: 3px 0 0 3px;
        transform: scaleY(0);
        transform-origin: bottom;
        transition: transform 0.25s ease;
      }
      .link-card:hover::before {
        transform: scaleY(1);
      }
      .link-card:hover {
        background: var(--surface2);
        border-color: var(--card-accent, var(--green));
        transform: translateX(4px);
      }

      .link-card:nth-child(1) {
        --card-accent: #22c55e;
        animation: slideIn 0.4s ease 0.05s both;
      }
      .link-card:nth-child(2) {
        --card-accent: #eab308;
        animation: slideIn 0.4s ease 0.1s both;
      }
      .link-card:nth-child(3) {
        --card-accent: #38bdf8;
        animation: slideIn 0.4s ease 0.15s both;
      }
      .link-card:nth-child(4) {
        --card-accent: #a78bfa;
        animation: slideIn 0.4s ease 0.2s both;
      }
      .link-card:nth-child(5) {
        --card-accent: #fb923c;
        animation: slideIn 0.4s ease 0.25s both;
      }
      .link-card:nth-child(6) {
        --card-accent: #f472b6;
        animation: slideIn 0.4s ease 0.3s both;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-16px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .link-icon {
        width: 38px;
        height: 38px;
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 17px;
        flex-shrink: 0;
      }

      .link-info {
        flex: 1;
      }
      .link-label {
        font-family: var(--mono);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--text3);
        margin-bottom: 2px;
      }
      .link-value {
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
      }

      .link-arrow {
        font-family: var(--mono);
        font-size: 14px;
        color: var(--text3);
        transition:
          color 0.2s,
          transform 0.2s;
      }
      .link-card:hover .link-arrow {
        color: var(--card-accent);
        transform: translateX(3px);
      }

      .footer {
        margin-top: 48px;
        text-align: center;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text3);
        letter-spacing: 1px;
      }
      .footer span {
        color: var(--green);
      }
    </style>
  </head>
  <body>
    <div class="grid-bg"></div>
    <div class="noise"></div>
    <div class="glow-orb"></div>

    <div class="page">
      <div class="header">
        <div class="avatar-wrap">
          <div class="avatar-inner">👤</div>
        </div>
        <div class="name" id="disp-name"></div>
        <div class="tag-line" id="disp-title"></div>
      </div>

      <div class="divider"></div>

      <div class="links">
        <a class="link-card" id="card-phone" href="#">
          <div class="link-icon">📞</div>
          <div class="link-info">
            <div class="link-label">Phone</div>
            <div class="link-value" id="disp-phone">+91 7975524393</div>
          </div>
          <div class="link-arrow">→</div>
        </a>
        <a class="link-card" id="card-email" href="#">
          <div class="link-icon">✉️</div>
          <div class="link-info">
            <div class="link-label">Email</div>
            <div class="link-value" id="disp-email"></div>
          </div>
          <div class="link-arrow">→</div>
        </a>
        <a class="link-card" id="card-portfolio" href="#" target="_blank">
          <div class="link-icon">🌐</div>
          <div class="link-info">
            <div class="link-label">Portfolio</div>
            <div class="link-value" id="disp-portfolio"></div>
          </div>
          <div class="link-arrow">→</div>
        </a>
        <a class="link-card" id="card-github" href="#" target="_blank">
          <div class="link-icon">🐙</div>
          <div class="link-info">
            <div class="link-label">GitHub</div>
            <div class="link-value" id="disp-github"></div>
          </div>
          <div class="link-arrow">→</div>
        </a>
        <a class="link-card" id="card-video" href="#" target="_blank">
          <div class="link-icon">🎬</div>
          <div class="link-info">
            <div class="link-label">Video Resume</div>
            <div class="link-value" id="disp-video"></div>
          </div>
          <div class="link-arrow">→</div>
        </a>
        <a class="link-card" id="card-linkedin" href="#" target="_blank">
          <div class="link-icon">💼</div>
          <div class="link-info">
            <div class="link-label">LinkedIn</div>
            <div class="link-value" id="disp-linkedin"></div>
          </div>
          <div class="link-arrow">→</div>
        </a>
      </div>

      <div class="footer">
        <span>VS</span> · RESUME HUB · ALL SYSTEMS ONLINE
      </div>
    </div>

    <script>
      // ╔══════════════════════════════════════════════════════════╗
      // ║         ✏️  YOUR INFO — ONLY EDIT THIS SECTION           ║
      // ╚══════════════════════════════════════════════════════════╝

      const MY = {
        name: 'Vinayak Sharma', // ① Full name
        title: 'Associate Engineer - IIoT', // ② Job title / tagline

        phone: '+91 7975524393', // ③ Phone number
        email: 'vvsharma999@gmail.com', // ④ Email address
        portfolio: 'https://vinayaksharma.dpdns.org/', // ⑤ Portfolio URL
        github: 'https://github.com/Vinayaksharma17', // ⑥ GitHub profile URL
        video: 'https://youtube.com/shorts/nhTyncMMm0s', // ⑦ Video resume URL (YouTube / Loom / Vimeo)
        linkedin: 'https://www.linkedin.com/in/vinayak-sharma17/', // ⑧ LinkedIn profile URL
      }

      // ╔══════════════════════════════════════════════════════════╗
      // ║           🚫  DO NOT EDIT BELOW THIS LINE               ║
      // ╚══════════════════════════════════════════════════════════╝

      function clean(url) {
        return url.replace(/^https?:\/\//, '').replace(/\/$/, '')
      }

      document.getElementById('disp-name').innerHTML =
        '<span>' + MY.name.charAt(0) + '</span>' + MY.name.slice(1)

      document.getElementById('disp-title').innerHTML =
        MY.title + '<span class="cursor"></span>'

      document.getElementById('disp-phone').textContent = MY.phone
      document.getElementById('disp-email').textContent = MY.email
      document.getElementById('disp-portfolio').textContent = clean(
        MY.portfolio,
      )
      document.getElementById('disp-github').textContent = clean(MY.github)
      document.getElementById('disp-video').textContent = MY.video
        ? 'Watch intro ▶'
        : '—'
      document.getElementById('disp-linkedin').textContent = clean(MY.linkedin)

      document.getElementById('card-phone').href =
        'tel:' + MY.phone.replace(/\D/g, '')
      document.getElementById('card-email').href = 'mailto:' + MY.email
      document.getElementById('card-portfolio').href = MY.portfolio
      document.getElementById('card-github').href = MY.github
      document.getElementById('card-video').href = MY.video || '#'
      document.getElementById('card-linkedin').href = MY.linkedin
    </script>
  </body>
</html>
